name: Publish to npm

# Publishes on every version tag (e.g. v1.0.0). Uses npm Trusted Publishing
# (OIDC), so no NPM_TOKEN secret is needed — the id-token permission below lets
# GitHub Actions prove its identity to npm. Configure the trusted publisher once
# on npmjs.com: package settings -> Trusted Publisher -> GitHub Actions, with
# repo pebeto/pluto-design-system and workflow file publish.yml.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Build the bundle
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
